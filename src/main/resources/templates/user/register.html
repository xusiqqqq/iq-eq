<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>X+图书管理系统 - 注册</title>
    <meta name="keywords" content="X+约课平台,在线约课,后台手动约课,课程管理,老师管理,排课计划,群发短信">
    <meta name="description" content="X+乐约课是一个完全响应式，基于Bootstrap3最新版本开发的扁平化主题，她采用了主流的左右两栏式布局，使用了Html5+CSS3等现代技术">

    <link rel="shortcut icon" href="../../static/ico/favicon.ico" th:href="@{/static/ico/favicon.ico}">

    <link href="../../static/css/bootstrap.min.css" th:href="@{/static/css/bootstrap.min.css}" rel="stylesheet">
    <link href="../../static/css/font-awesome.css?v=4.4.0" th:href="@{/static/css/font-awesome.css(v='4.4.0')}" rel="stylesheet">
    <link href="../../static/css/animate.css" th:href="@{/static/css/animate.css}" rel="stylesheet">
    <link href="../../static/css/style.css?v=4.1.0" th:href="@{/static/css/style.css(v='4.1.0')}" rel="stylesheet">

    <link href="../../static/css/plugins/iCheck/custom.css" th:href="@{/static/css/plugins/iCheck/custom.css}" rel="stylesheet">
    <script>if(window.top !== window.self){ window.top.location = window.location;}</script>

</head>

<body class="gray-bg">

    <div class="middle-box text-center loginscreen   animated fadeInDown">
        <div>
            <div>

                <h1 class="logo-name">X+</h1>

            </div>
            <h3>欢迎注册 X+图书管理系统</h3>
            <p>创建一个X+图书管理新账号</p>
            <form class="m-t" role="form" th:action="@{/user/register}">
                <div id="div1" class="form-group" style="display: flex;">
                    <input id="name" type="text" class="form-control" name="userName" placeholder="请输入用户名" required="" >
<!--                    <span th:if="${IS_REGISTER}"  class="text-danger">-->
<!--                        用户不存在-->
<!--                    </span>-->

                </div>

                <div class="form-group">
                    <input id="pwd1" type="password" class="form-control" name="password" placeholder="请输入密码" required="" style="color:black" >
                </div>
                <div class="form-group">
                    <input id="pwd2" type="password" class="form-control" name="pwd2" placeholder="请再次输入密码" required="" style="color:black">

                </div>
                <div class="form-group">
                    <span th:text="${message}" class="text-danger">
                    </span>
                </div>
                <div class="form-group text-left">
                    <div class="checkbox i-checks">
                        <label class="no-padding">
                            <input id="agree" type="checkbox"><i></i> 我同意注册协议</label>
                    </div>
                </div>
                <button id="btn" type="submit" class="btn btn-primary block full-width m-b" >注 册</button>

                <p class="text-muted text-center"><small>已经有账户了？</small><a href="login.html" th:href="@{/user/toLogin}" >点此登录</a>
                </p>

            </form>
        </div>
    </div>

    <!-- 全局js -->
    <script src="../../static/js/jquery.min.js?v=2.1.4" th:src="@{/static/js/jquery.min.js(v='2.1.4')}"></script>
    <script src="../../static/js/bootstrap.min.js?v=3.3.6" th:src="@{/static/js/bootstrap.min.js(v='3.3.6')}"></script>
    <!-- iCheck -->
    <script src="../../static/js/plugins/iCheck/icheck.min.js" th:src="@{/static/js/plugins/iCheck/icheck.min.js}"></script>
    <script>
        $(document).ready(function () {
            $('#agree').iCheck({
                checkboxClass: 'icheckbox_square-green',
                radioClass: 'iradio_square-green',
            });
        });

        $("#name").change(function (){
            // var appName = [[${#request.getContextPath()}]];
            // console.log("appName: " + appName);
            $.ajax({
                //发送AJAX请求
                url:"/user/verify?userName=" + $("#name").val(),
                method: "GET",
                async: true,
                dataType: "text",  //拿到json
                success: function (data) {
                    $('.label-info').remove();
                    $("#div1").append("<span class='label-info'>"+data+"</span>");
                    // $("#HAS_REGISTER").val(data.data);
                    // window.location.reload();
                },
                error: function (jqXHR) {
                    alert("获取数据失败");
                }
            });

        })

        $(function (){
            $("#btn").click(function (){
                var pwd=$("#pwd1").val();
                var pwd2=$("#pwd2").val();
                if(pwd!=pwd2){
                    alert("两次密码不一致");
                    $("#name").val("");
                    $("#pwd1").val("");
                    $("#pwd2").val("");
                    return false;
                }

                if(!$('#agree').prop("checked")){
                    alert("您还没有同意注册协议！");
                    $("#name").val("");
                    $("#pwd1").val("");
                    $("#pwd2").val("");
                    $("#agree").val("checked",false)
                    return false;
                }
                return true;
            });
        })




    </script>


</body>

</html>
